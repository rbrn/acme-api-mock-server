# Server Configuration
server.port=${PORT:8080}

# Disable Spring Boot's embedded web server - WireMock will handle requests
spring.main.web-application-type=none

# WireMock Configuration
wiremock.server.port=${PORT:8080}

# API Key (set via MOCK_API_KEY env var; blank = no protection)
mock.api.key=${MOCK_API_KEY:}

# Logging Configuration
logging.level.root=INFO
logging.level.com.db.olbfe.demoaccount=DEBUG
logging.level.com.github.tomakehurst.wiremock=DEBUG

# Application Info
spring.application.name=demo-account-mock-server
